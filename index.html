<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Snake Arcade</p>
          <h1>贪吃蛇</h1>
        </div>
        <div class="top-actions">
          <button class="name-button" id="usernameButton" type="button" title="设置用户名" aria-label="设置用户名">玩家</button>
          <button class="icon-button" id="soundButton" type="button" title="音效" aria-label="音效">♪</button>
          <button class="icon-button" id="pauseButton" type="button" title="暂停或继续" aria-label="暂停或继续">⏯</button>
          <button class="icon-button" id="restartButton" type="button" title="重新开始" aria-label="重新开始">↻</button>
        </div>
      </header>

      <div class="game-layout">
        <section class="play-area" aria-label="贪吃蛇棋盘">
          <canvas id="board" width="720" height="720"></canvas>
          <div class="flash" id="flash" aria-hidden="true"></div>
          <div class="overlay is-visible" id="overlay">
            <h2 id="overlayTitle">贪吃蛇</h2>
            <p id="message">按空格开始</p>
            <button id="startButton" type="button">开始游戏</button>
          </div>
        </section>

        <aside class="side-panel" aria-label="游戏信息">
          <section class="hud" aria-label="游戏状态">
            <div>
              <span class="label">分数</span>
              <strong id="score">0</strong>
            </div>
            <div>
              <span class="label">最佳</span>
              <strong id="best">0</strong>
            </div>
            <div>
              <span class="label">连击</span>
              <strong id="combo">0</strong>
            </div>
            <div>
              <span class="label">速度</span>
              <strong id="speed">1x</strong>
            </div>
          </section>

          <section class="settings" aria-label="游戏设置">
            <div class="segmented" role="group" aria-label="难度">
              <button class="is-active" data-difficulty="easy" type="button">休闲</button>
              <button data-difficulty="normal" type="button">标准</button>
              <button data-difficulty="hard" type="button">高手</button>
            </div>
            <div class="segmented" role="group" aria-label="模式">
              <button class="is-active" data-mode="wall" type="button">边界</button>
              <button data-mode="wrap" type="button">穿墙</button>
            </div>
          </section>

          <section class="profile-board" aria-label="排行榜">
            <section class="leaderboard" aria-label="排行榜">
              <div class="leaderboard-head">
                <h2>排行榜</h2>
                <span id="leaderboardStatus">本地</span>
              </div>
              <ol id="leaderboardList"></ol>
            </section>
          </section>
        </aside>
      </div>

      <section class="controls" aria-label="方向控制">
        <div class="hint">方向键 / WASD / 滑动</div>
        <div class="dpad" aria-label="方向键">
          <button data-dir="up" type="button" aria-label="向上">▲</button>
          <button data-dir="left" type="button" aria-label="向左">◀</button>
          <button data-dir="down" type="button" aria-label="向下">▼</button>
          <button data-dir="right" type="button" aria-label="向右">▶</button>
        </div>
      </section>
    </main>

    <dialog class="username-dialog" id="usernameDialog">
      <form class="username-modal" id="playerForm" method="dialog">
        <div>
          <p class="modal-eyebrow">Player Profile</p>
          <h2>设置用户名</h2>
        </div>
        <label for="usernameInput">用户名</label>
        <input id="usernameInput" name="username" maxlength="16" autocomplete="nickname" />
        <p id="usernameHelp">每个玩家每天只能修改一次用户名。</p>
        <div class="modal-actions">
          <button id="cancelNameButton" type="button">取消</button>
          <button id="saveNameButton" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <script src="game.js"></script>
  </body>
</html>
